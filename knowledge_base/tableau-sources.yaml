site:
  server: "https://atlas.vng.com.vn"
  site_name: "ZLPDataServices"
  access_method: "Tableau MCP with PAT from environment"
  secret_policy: "Never store PAT secrets in this knowledge base."

runtime_notes:
  rest_api_version: "Configured locally via REST_API_VERSION in ~/.codex/tableau-mcp.env"
  concurrency: "Use sequential Tableau calls. Retry 401 once."
  datasource_query: "VizQL Data Service is disabled, so direct datasource query is unavailable."
  preferred_data_access: "get_view_data for published dashboard views."

dashboards:
  insurance_performance:
    display_name: "Insurance Performance"
    url: "https://atlas.vng.com.vn/#/site/ZLPDataServices/views/InsurancePerformance/Dashboard1?:iid=2"
