    view_luid: "d3bc93f4-3036-449c-84f8-0a4875cbfc5b"
    workbook_content_url: "InsurancePerformance"
    default_view_name: "Performance"
    primary_use:
      - "TPV/MPU/NPU/FPU/Transaction/Discount monitoring"
      - "MTD and YTM trends"
      - "Product/category/app/SKU performance diagnosis"
    observed_csv_fields:
      - "Period_Type"
      - "Switch Break View"
      - "AOV"
      - "TPV"
      - "TRANS"
      - "USERS_DAILY"
      - "Max. Ymd"
    key_filters_seen:
      - "Start Date"
      - "End Date"
      - "Metrics"
      - "Break View"
      - "Platform"
      - "User Type"
      - "Campaign Name"
      - "Product Name"
      - "App Name"
      - "Category"
      - "Sku"

